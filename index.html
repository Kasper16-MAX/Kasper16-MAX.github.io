<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Копилка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- ЛЕВОЕ МЕНЮ -->
    <div class="sidebar">

        <h2>Мои копилки</h2>

        <div id="piggyList"></div>

        <hr>

        <input id="name" type="text" placeholder="Название">

        <input id="goal" type="number" placeholder="Цель">

        <button onclick="createPiggy()">
            Создать копилку
        </button>

    </div>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <div class="main">

        <div id="piggyInfo">
            <h1>Выберите копилку</h1>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
