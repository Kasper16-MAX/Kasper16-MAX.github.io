<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Копилка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- ЛЕВОЕ МЕНЮ -->
    <div class="sidebar">

        <h2>Мои копилки</h2>

        <div id="piggyList"></div>

        <hr>

        <input id="name" type="text" placeholder="Название">

        <input id="goal" type="number" placeholder="Цель">

        <button onclick="createPiggy()">
            Создать копилку
        </button>

    </div>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <div class="main">

        <div id="piggyInfo">
            <h1>Выберите копилку</h1>
        </div>

    </div>

</div>

<!-- Модальное окно -->
<div id="modal" class="modal">

    <div class="modal-content">

        <h2 id="modalTitle"></h2>

        <input
            type="text"
            id="modalInput"
            placeholder=""
        >

        <div class="modal-buttons">

            <button onclick="confirmModal()">
                ОК
            </button>

            <button
                class="cancel-button"
                onclick="closeModal()">

                Отмена

            </button>

        </div>

    </div>

</div>

<!-- Нижняя панель -->
<div class="bottom-nav">

    <button onclick="togglePiggyMenu()">
        🏦 Мои копилки
    </button>

    <button onclick="showCreateForm()">
        ➕ Создать
    </button>

</div>
<script src="script.js"></script>

</body>
</html>
